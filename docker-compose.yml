services:
  postgres:
    image: postgres:16-alpine
    container_name: devroast-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-devroast}
      POSTGRES_USER: ${POSTGRES_USER:-devroast}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devroast}
    volumes:
      - devroast_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-devroast} -d ${POSTGRES_DB:-devroast}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  devroast_postgres_data:
